<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Classic Snake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    html, body {
      width: 100%; height: 100%;
      background: #0d1117; color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      overflow: hidden; padding-bottom: env(safe-area-inset-bottom);
    }
    canvas { touch-action: none; }
    .wrapper {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100%; flex: 1; min-height: 0; padding: 4px;
    }
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 360px; margin-bottom: 8px; font-size: 13px; font-weight: 700;
    }
    #canvas {
      border: 2px solid #30363d; border-radius: 12px;
      background: #161b22; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      max-width: 100%; max-height: calc(100vh - 150px); object-fit: contain;
    }
    .dpad {
      display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px);
      gap: 4px; margin-bottom: 8px; flex-shrink: 0; justify-content: center;
    }
    .dp-btn {
      touch-action: manipulation; cursor: pointer; pointer-events: auto; position: relative; z-index: 100;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
      color: #fff; font-size: 18px; font-weight: bold; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .dp-btn:active { background: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="hud">
      <div style="color: #4ade80;">SCORE: <span id="score">0</span></div>
      <div style="color: #fbbf24;">BEST: <span id="best">0</span></div>
    </div>
    <canvas id="canvas" width="360" height="360"></canvas>
  </div>

  <div class="dpad">
    <div></div><button class="dp-btn" id="btn-up">▲</button><div></div>
    <button class="dp-btn" id="btn-left">◄</button><div></div><button class="dp-btn" id="btn-right">►</button>
    <div></div><button class="dp-btn" id="btn-down">▼</button><div></div>
  </div>

  <script>
    (function() {
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');
      var scoreEl = document.getElementById('score');
      var bestEl = document.getElementById('best');

      var GRID = 18, CELL = 20;
      var snake = [{x: 9, y: 9}, {x: 8, y: 9}];
      var dir = {x: 1, y: 0}, nextDir = {x: 1, y: 0};
      var food = {x: 14, y: 9};
      var score = 0, best = parseInt(localStorage.getItem('snake_best') || '0', 10);
      bestEl.textContent = best;
      var gameOver = false, speed = 110;

      function spawnFood() {
        food = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
        for (var i = 0; i < snake.length; i++) {
          if (snake[i].x === food.x && snake[i].y === food.y) spawnFood();
        }
      }

      function update() {
        if (gameOver) return;
        dir = nextDir;
        var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        head.x = (head.x + GRID) % GRID; head.y = (head.y + GRID) % GRID;

        for (var i = 0; i < snake.length; i++) {
          if (snake[i].x === head.x && snake[i].y === head.y) {
            gameOver = true; return;
          }
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
          score += 10; scoreEl.textContent = score;
          if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
          spawnFood();
        } else { snake.pop(); }
      }

      function draw() {
        ctx.fillStyle = '#161b22'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#21262d';
        for (var x = 0; x < GRID; x++) {
          for (var y = 0; y < GRID; y++) ctx.fillRect(x * CELL + CELL / 2 - 1, y * CELL + CELL / 2 - 1, 2, 2);
        }
        for (var i = 0; i < snake.length; i++) {
          ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
          ctx.beginPath(); ctx.roundRect(snake[i].x * CELL + 2, snake[i].y * CELL + 2, CELL - 4, CELL - 4, i === 0 ? 6 : 4); ctx.fill();
        }
        ctx.fillStyle = '#f87171';
        ctx.beginPath(); ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2); ctx.fill();

        if (gameOver) {
          ctx.fillStyle = 'rgba(13, 17, 23, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#ef4444'; ctx.font = 'bold 24px system-ui'; ctx.textAlign = 'center';
          ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
          ctx.font = '14px system-ui'; ctx.fillStyle = '#9ca3af';
          ctx.fillText('Tap D-Pad to restart', canvas.width / 2, canvas.height / 2 + 20);
        }
      }

      function reset() {
        snake = [{x: 9, y: 9}, {x: 8, y: 9}];
        dir = {x: 1, y: 0}; nextDir = {x: 1, y: 0};
        score = 0; scoreEl.textContent = '0'; gameOver = false;
        spawnFood();
      }

      function loop() { update(); draw(); setTimeout(loop, speed); }

      function setDir(dx, dy) {
        if (gameOver) { reset(); return; }
        if (dx === 1 && dir.x !== -1) nextDir = {x: 1, y: 0};
        if (dx === -1 && dir.x !== 1) nextDir = {x: -1, y: 0};
        if (dy === 1 && dir.y !== -1) nextDir = {x: 0, y: 1};
        if (dy === -1 && dir.y !== 1) nextDir = {x: 0, y: -1};
      }

      function bindBtn(id, dx, dy) {
        var el = document.getElementById(id);
        if (!el) return;
        var handle = function(e) {
          if (e) { e.preventDefault(); e.stopPropagation(); }
          setDir(dx, dy);
        };
        el.addEventListener('pointerdown', handle);
        el.addEventListener('click', handle);
      }

      bindBtn('btn-up', 0, -1);
      bindBtn('btn-down', 0, 1);
      bindBtn('btn-left', -1, 0);
      bindBtn('btn-right', 1, 0);

      canvas.addEventListener('pointerdown', function(e) { if (gameOver) reset(); });

      window.addEventListener('keydown', function(e) {
        if (gameOver) { if (e.code === 'Space') reset(); return; }
        if ((e.key === 'ArrowUp' || e.key === 'w') && dir.y !== 1) nextDir = {x: 0, y: -1};
        if ((e.key === 'ArrowDown' || e.key === 's') && dir.y !== -1) nextDir = {x: 0, y: 1};
        if ((e.key === 'ArrowLeft' || e.key === 'a') && dir.x !== 1) nextDir = {x: -1, y: 0};
        if ((e.key === 'ArrowRight' || e.key === 'd') && dir.x !== -1) nextDir = {x: 1, y: 0};
      });

      spawnFood(); loop();
    })();
  </script>
</body>
</html>
