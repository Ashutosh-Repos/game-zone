<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sinuous</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    canvas { touch-action: none; cursor: crosshair; }
    .wrapper {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #canvas { display: block; max-width: 100vw; max-height: 100vh; object-fit: contain; }
    .overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); z-index: 50;
    }
    .overlay h1 { font-size: 38px; font-weight: 900; color: #38bdf8; margin-bottom: 8px; }
    .overlay p { font-size: 13px; color: #94a3b8; margin-bottom: 20px; text-align: center; max-width: 280px; }
    .btn {
      touch-action: manipulation; cursor: pointer; pointer-events: auto; position: relative; z-index: 100;
      background: #38bdf8; color: #000; font-size: 15px; font-weight: 800;
      padding: 12px 32px; border-radius: 12px; border: none;
      box-shadow: 0 4px 14px rgba(56,189,248,0.4); transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="wrapper">
    <canvas id="canvas" width="480" height="580"></canvas>
    <div class="overlay" id="start-screen">
      <h1>SINUOUS</h1>
      <p>Dodge red dots! Collect green shields and blue multiplier nodes.</p>
      <button class="btn" id="start-btn">PLAY NOW</button>
    </div>
  </div>

  <script>
    (function() {
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');
      var startScreen = document.getElementById('start-screen');
      var startBtn = document.getElementById('start-btn');

      var W = 480, H = 580;
      var player = { x: W / 2, y: H / 2, r: 6, trail: [], shield: 0 };
      var enemies = [], nodes = [];
      var score = 0, best = parseInt(localStorage.getItem('sinuous_best') || '0', 10);
      var state = 'idle', timer = 0;

      function reset() {
        player.x = W / 2; player.y = H / 2; player.trail = []; player.shield = 0;
        enemies = []; nodes = []; score = 0; timer = 0;
        state = 'playing';
        startScreen.style.display = 'none';
      }

      function spawnEnemy() {
        var side = Math.floor(Math.random() * 4);
        var x, y, vx, vy;
        if (side === 0) { x = Math.random() * W; y = -10; vx = (Math.random() - 0.5) * 2; vy = Math.random() * 2 + 1; }
        else if (side === 1) { x = W + 10; y = Math.random() * H; vx = -(Math.random() * 2 + 1); vy = (Math.random() - 0.5) * 2; }
        else if (side === 2) { x = Math.random() * W; y = H + 10; vx = (Math.random() - 0.5) * 2; vy = -(Math.random() * 2 + 1); }
        else { x = -10; y = Math.random() * H; vx = Math.random() * 2 + 1; vy = (Math.random() - 0.5) * 2; }
        enemies.push({ x: x, y: y, vx: vx, vy: vy, r: 4 });
      }

      function spawnNode() {
        nodes.push({
          x: Math.random() * (W - 40) + 20,
          y: Math.random() * (H - 40) + 20,
          r: 7, type: Math.random() < 0.6 ? 'shield' : 'mult'
        });
      }

      function update() {
        if (state !== 'playing') return;

        player.trail.unshift({ x: player.x, y: player.y });
        if (player.trail.length > 18) player.trail.pop();

        timer++; score += 1;
        if (score > best) { best = score; localStorage.setItem('sinuous_best', best); }

        if (timer % 15 === 0 && enemies.length < 40) spawnEnemy();
        if (timer % 120 === 0 && nodes.length < 4) spawnNode();

        for (var i = enemies.length - 1; i >= 0; i--) {
          var e = enemies[i]; e.x += e.vx; e.y += e.vy;
          if (e.x < -20 || e.x > W + 20 || e.y < -20 || e.y > H + 20) { enemies.splice(i, 1); continue; }

          if (Math.hypot(player.x - e.x, player.y - e.y) < player.r + e.r) {
            if (player.shield > 0) {
              player.shield--; enemies.splice(i, 1);
            } else {
              state = 'dead'; showGameOver();
            }
          }
        }

        for (var j = nodes.length - 1; j >= 0; j--) {
          var n = nodes[j];
          if (Math.hypot(player.x - n.x, player.y - n.y) < player.r + n.r) {
            if (n.type === 'shield') player.shield = Math.min(3, player.shield + 1);
            else score += 200;
            nodes.splice(j, 1);
          }
        }
      }

      function showGameOver() {
        startScreen.style.display = 'flex';
        startScreen.querySelector('h1').textContent = 'GAME OVER';
        startScreen.querySelector('p').textContent = 'Score: ' + score + '  |  Best: ' + best;
        startBtn.textContent = 'TRY AGAIN';
      }

      function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

        for (var t = 0; t < player.trail.length; t++) {
          var pt = player.trail[t];
          ctx.fillStyle = 'rgba(56, 189, 248, ' + (1 - t / player.trail.length) + ')';
          ctx.beginPath(); ctx.arc(pt.x, pt.y, player.r * (1 - t / (player.trail.length * 1.5)), 0, Math.PI * 2); ctx.fill();
        }

        ctx.fillStyle = player.shield > 0 ? '#22c55e' : '#38bdf8';
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = '#ef4444';
        enemies.forEach(function(e) { ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill(); });

        nodes.forEach(function(n) {
          ctx.fillStyle = n.type === 'shield' ? '#22c55e' : '#38bdf8';
          ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
        });

        ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 12px system-ui';
        ctx.fillText('SCORE: ' + score, 10, 24);
        ctx.fillText('SHIELD: ' + '🛡️'.repeat(player.shield), W - 100, 24);
      }

      function loop() { update(); draw(); requestAnimationFrame(loop); }

      function handleAction(e) {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        reset();
      }

      startBtn.addEventListener('pointerdown', handleAction);
      startBtn.addEventListener('click', handleAction);

      window.addEventListener('pointermove', function(e) {
        var rect = canvas.getBoundingClientRect();
        player.x = Math.max(10, Math.min(W - 10, e.clientX - rect.left));
        player.y = Math.max(10, Math.min(H - 10, e.clientY - rect.top));
      });

      loop();
    })();
  </script>
</body>
</html>
