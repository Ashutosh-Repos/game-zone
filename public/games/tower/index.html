<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tower Stack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    html, body {
      width: 100%; height: 100%;
      background: #0f172a; color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    canvas { touch-action: none; cursor: pointer; }
    .wrapper {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #canvas { display: block; max-width: 100vw; max-height: 100vh; object-fit: contain; }
    .overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(15, 23, 42, 0.88); backdrop-filter: blur(4px); z-index: 50;
    }
    .overlay h1 { font-size: 36px; font-weight: 900; color: #38bdf8; margin-bottom: 8px; }
    .overlay p { font-size: 13px; color: #94a3b8; margin-bottom: 20px; text-align: center; }
    .btn {
      touch-action: manipulation; cursor: pointer; pointer-events: auto; position: relative; z-index: 100;
      background: #0284c7; color: #fff; font-size: 15px; font-weight: 700;
      padding: 12px 32px; border-radius: 12px; border: none;
      box-shadow: 0 4px 14px rgba(2,132,199,0.4); transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="wrapper">
    <canvas id="canvas" width="360" height="540"></canvas>
    <div class="overlay" id="start-screen">
      <h1>TOWER STACK</h1>
      <p>Tap Screen or Space to Drop Blocks!</p>
      <button class="btn" id="start-btn">STACK NOW</button>
    </div>
  </div>

  <script>
    (function() {
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');
      var startScreen = document.getElementById('start-screen');
      var startBtn = document.getElementById('start-btn');

      var W = 360, H = 540;
      var stack = [], current = null, score = 0, best = parseInt(localStorage.getItem('tower_best') || '0', 10);
      var state = 'idle', cameraY = 0;
      var COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#a855f7', '#ec4899'];

      function reset() {
        stack = [{ x: W / 2 - 60, y: H - 50, w: 120, h: 25, color: '#38bdf8' }];
        score = 0; cameraY = 0;
        spawnBlock();
        state = 'playing';
        startScreen.style.display = 'none';
      }

      function spawnBlock() {
        var prev = stack[stack.length - 1];
        var color = COLORS[stack.length % COLORS.length];
        current = { x: 0, y: prev.y - 25, w: prev.w, h: 25, vx: 3.5, color: color };
      }

      function drop() {
        if (state === 'idle') { reset(); return; }
        if (state === 'dead') { reset(); return; }
        if (state !== 'playing' || !current) return;

        var prev = stack[stack.length - 1];
        var diff = current.x - prev.x;

        if (Math.abs(diff) >= current.w) {
          state = 'dead'; showGameOver(); return;
        }

        var newW = current.w - Math.abs(diff);
        var newX = diff > 0 ? current.x : prev.x;
        current.w = newW; current.x = newX;
        stack.push(current);

        score++;
        if (score > best) { best = score; localStorage.setItem('tower_best', best); }

        if (current.y < H / 2) cameraY += 25;
        spawnBlock();
      }

      function showGameOver() {
        startScreen.style.display = 'flex';
        startScreen.querySelector('h1').textContent = 'GAME OVER';
        startScreen.querySelector('p').textContent = 'Tower Height: ' + score + '  |  Best: ' + best;
        startBtn.textContent = 'TRY AGAIN';
      }

      function update() {
        if (state !== 'playing' || !current) return;
        current.x += current.vx;
        if (current.x <= 0 || current.x + current.w >= W) current.vx *= -1;
      }

      function draw() {
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

        ctx.save(); ctx.translate(0, cameraY);
        stack.forEach(function(b) {
          ctx.fillStyle = b.color;
          ctx.fillRect(b.x, b.y, b.w, b.h);
        });

        if (current && state === 'playing') {
          ctx.fillStyle = current.color;
          ctx.fillRect(current.x, current.y, current.w, current.h);
        }
        ctx.restore();

        ctx.fillStyle = '#fff'; ctx.font = 'bold 32px system-ui'; ctx.textAlign = 'center';
        if (state === 'playing') ctx.fillText(score, W / 2, 50);
      }

      function loop() { update(); draw(); requestAnimationFrame(loop); }

      function handleAction(e) {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        drop();
      }

      startBtn.addEventListener('pointerdown', handleAction);
      startBtn.addEventListener('click', handleAction);
      canvas.addEventListener('pointerdown', handleAction);

      window.addEventListener('keydown', function(e) {
        if (e.code === 'Space' || e.key === 'ArrowUp') drop();
      });

      loop();
    })();
  </script>
</body>
</html>
